name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}"
          CGO_ENABLED=0 go build -ldflags "$ldflags" \
            -o "should-build-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/should-build

      - uses: actions/upload-artifact@v4
        with:
          name: should-build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: should-build-${{ matrix.goos }}-${{ matrix.goarch }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum should-build-* > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            should-build-* checksums.txt

      - name: Update major version tag
        run: |
          major="${{ github.ref_name }}"
          major="${major%%.*}"
          git tag -f "$major"
          git push origin "$major" --force
