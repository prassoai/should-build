name: should-build
description: |
  Determine which build targets need rebuilding after a code change.
  Runs on Linux and macOS. Windows is not supported.
author: Prasso AI

branding:
  icon: filter
  color: blue

inputs:
  base:
    description: Base commit SHA (e.g. from nrwl/nx-set-shas).
    required: true
  head:
    description: Head commit SHA.
    required: true
  config:
    description: Path to config file, relative to repo root.
    required: false
    default: should-build.yaml
  only:
    description: Comma-separated target names to evaluate (no whitespace). Empty evaluates all.
    required: false
    default: ""
  repo:
    description: Repository root path.
    required: false
    default: "."
  verbose:
    description: Include per-file match rules in JSON output.
    required: false
    default: "false"

outputs:
  targets:
    description: JSON array of target names that need rebuilding, e.g. '["api","web"]'.
    value: ${{ steps.eval.outputs.targets }}
  any:
    description: '"true" if any target needs rebuilding, "false" otherwise.'
    value: ${{ steps.eval.outputs.any }}
  json:
    description: Full JSON output from should-build.
    value: ${{ steps.eval.outputs.json }}

runs:
  using: composite
  steps:
    - name: Download prebuilt binary
      id: download
      shell: bash
      run: |
        set -euo pipefail

        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in
          x86_64)       arch=amd64 ;;
          aarch64|arm64) arch=arm64 ;;
        esac

        binary="should-build-${os}-${arch}"
        tag="${{ github.action_ref }}"

        # Local action (uses: ./) or empty ref — skip download.
        if [[ -z "$tag" || "$tag" == *"/"* ]]; then
          echo "source=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        base_url="https://github.com/${{ github.action_repository }}/releases"

        download_and_verify() {
          local bin_url="$1" checksum_url="$2"
          curl -fsSL --retry 2 -o "$RUNNER_TEMP/should-build" "$bin_url" || return 1
          curl -fsSL --retry 2 -o "$RUNNER_TEMP/checksums.txt" "$checksum_url" || return 1

          local expected actual
          expected="$(grep "${binary}" "$RUNNER_TEMP/checksums.txt" | awk '{print $1}')"
          if command -v sha256sum &>/dev/null; then
            actual="$(sha256sum "$RUNNER_TEMP/should-build" | awk '{print $1}')"
          else
            actual="$(shasum -a 256 "$RUNNER_TEMP/should-build" | awk '{print $1}')"
          fi

          [[ -n "$expected" && "$expected" == "$actual" ]]
        }

        # Try exact tag first (works for v1.0.0), then latest release (works for v1 alias).
        for t in "$tag" "latest"; do
          if [[ "$t" == "latest" ]]; then
            bin_url="${base_url}/latest/download/${binary}"
            cs_url="${base_url}/latest/download/checksums.txt"
          else
            bin_url="${base_url}/download/${t}/${binary}"
            cs_url="${base_url}/download/${t}/checksums.txt"
          fi

          if download_and_verify "$bin_url" "$cs_url"; then
            chmod +x "$RUNNER_TEMP/should-build"
            echo "Downloaded prebuilt ${binary} (${t})"
            echo "source=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        done

        echo "::notice::Prebuilt binary not available for ${os}/${arch}; building from source."
        echo "source=true" >> "$GITHUB_OUTPUT"

    - name: Setup Go (fallback)
      if: steps.download.outputs.source == 'true'
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod

    - name: Build from source (fallback)
      if: steps.download.outputs.source == 'true'
      shell: bash
      run: |
        set -euo pipefail
        go build -o "$RUNNER_TEMP/should-build" "${{ github.action_path }}/cmd/should-build"

    - name: Evaluate targets
      id: eval
      shell: bash
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_ONLY: ${{ inputs.only }}
        INPUT_BASE: ${{ inputs.base }}
        INPUT_HEAD: ${{ inputs.head }}
      run: |
        set -euo pipefail

        args=(--json)
        args+=(--config "$INPUT_CONFIG")
        args+=(--repo "$INPUT_REPO")

        if [[ "$INPUT_VERBOSE" == "true" ]]; then
          args+=(--verbose)
        fi

        if [[ -n "$INPUT_ONLY" ]]; then
          IFS=',' read -ra FILTER <<< "$INPUT_ONLY"
          for t in "${FILTER[@]}"; do
            args+=(--target "$t")
          done
        fi

        args+=("$INPUT_BASE" "$INPUT_HEAD")

        json=$("$RUNNER_TEMP/should-build" "${args[@]}")

        # Validate the CLI produced a JSON array.
        if ! echo "$json" | jq -e 'type == "array"' > /dev/null 2>&1; then
          echo "::error::should-build did not produce a JSON array"
          exit 1
        fi

        targets=$(echo "$json" | jq -c '[.[] | select(.build == true) | .target]')
        any=$(echo "$json" | jq -r 'any(.[]; .build == true)')

        {
          echo "json<<SHOULD_BUILD_EOF"
          echo "$json"
          echo "SHOULD_BUILD_EOF"
          echo "targets=$targets"
          echo "any=$any"
        } >> "$GITHUB_OUTPUT"
