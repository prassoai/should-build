name: Test Action

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-action:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.should-build.outputs.targets }}
      any: ${{ steps.should-build.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create deterministic fixture
        id: fixture
        run: |
          # Record base before creating the test commit.
          echo "base=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          # Create a change that triggers alpha but not beta.
          git config user.email "test@test.com"
          git config user.name "Test"
          mkdir -p testdata/alpha
          echo "sentinel" > testdata/alpha/trigger.txt
          git add testdata/alpha/trigger.txt
          git commit -m "test: trigger alpha"

          echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run should-build
        id: should-build
        uses: ./
        with:
          base: ${{ steps.fixture.outputs.base }}
          head: ${{ steps.fixture.outputs.head }}
          config: .github/test-fixtures/should-build.yml

      - name: Verify outputs
        env:
          TARGETS: ${{ steps.should-build.outputs.targets }}
          ANY: ${{ steps.should-build.outputs.any }}
          JSON: ${{ steps.should-build.outputs.json }}
        run: |
          set -euo pipefail
          echo "targets=$TARGETS"
          echo "any=$ANY"

          # alpha was touched — it must appear in targets.
          echo "$TARGETS" | jq -e 'index("alpha") != null'

          # beta was NOT touched — it must not appear.
          echo "$TARGETS" | jq -e 'index("beta") == null'

          # any must be true (alpha needs rebuilding).
          [[ "$ANY" == "true" ]]

          # Full JSON: alpha.build == true, beta.build == false.
          echo "$JSON" | jq -e '.[] | select(.target == "alpha") | .build == true'
          echo "$JSON" | jq -e '.[] | select(.target == "beta") | .build == false'

      # Verify the step summary was written by the action.
      # $GITHUB_STEP_SUMMARY is per-step and not readable across steps,
      # so the action also writes to $RUNNER_TEMP/should-build-summary.md.
      - name: Verify step summary
        run: |
          set -euo pipefail
          summary=$(cat "$RUNNER_TEMP/should-build-summary.md")
          echo "$summary"

          # The summary must contain the markdown table header.
          echo "$summary" | grep -q "| Target | Build | Trigger |"

          # alpha rebuilt — verify it shows the rebuild icon.
          echo "$summary" | grep -qE 'alpha.*✅'

          # beta skipped — verify it shows the skip icon.
          echo "$summary" | grep -qE 'beta.*⬜'

  # Verify the only (filter) input restricts evaluation to named targets.
  test-action-filtered:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create deterministic fixture
        id: fixture
        run: |
          echo "base=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          git config user.email "test@test.com"
          git config user.name "Test"
          mkdir -p testdata/alpha
          echo "sentinel" > testdata/alpha/trigger.txt
          git add testdata/alpha/trigger.txt
          git commit -m "test: trigger alpha"

          echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run should-build (filtered to beta)
        id: should-build
        uses: ./
        with:
          base: ${{ steps.fixture.outputs.base }}
          head: ${{ steps.fixture.outputs.head }}
          config: .github/test-fixtures/should-build.yml
          only: beta

      - name: Verify filtered output
        env:
          TARGETS: ${{ steps.should-build.outputs.targets }}
          ANY: ${{ steps.should-build.outputs.any }}
          JSON: ${{ steps.should-build.outputs.json }}
        run: |
          set -euo pipefail

          # Only beta was evaluated; testdata/beta/** was not touched.
          echo "$JSON" | jq -e 'length == 1'
          echo "$JSON" | jq -e '.[0].target == "beta"'
          echo "$JSON" | jq -e '.[0].build == false'

          # targets array must be empty (nothing needs building).
          echo "$TARGETS" | jq -e 'length == 0'

          # any must be false.
          [[ "$ANY" == "false" ]]

  # Simulate a consumer calling the action from a different repo.
  #
  # When a consumer uses `uses: prassoai/should-build@v0`, GitHub Actions
  # checks out the action to _actions/prassoai/should-build/v0/ and runs
  # it with CWD = consumer repo. This test reproduces that layout:
  #   - The action source lives in _action/ (simulates the actions checkout).
  #   - The working directory is consumer/ (simulates the consumer repo).
  #
  # Before the fix, two bugs prevented this from working:
  #   1. tag/repo were empty (${{ github.action_ref }} not available in
  #      composite run: blocks — must use $GITHUB_ACTION_REF env var).
  #   2. `go build` ran in the consumer CWD and failed with "outside main
  #      module" because the action's go.mod is in a different directory.
  test-consumer-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: _action

      - uses: actions/setup-go@v5
        with:
          go-version-file: _action/go.mod

      - name: Create consumer repo
        run: |
          set -euo pipefail
          mkdir consumer && cd consumer
          git init
          git config user.email "ci@test" && git config user.name "CI"

          cat > should-build.yaml <<'YAML'
          targets:
            svc:
              lang: none
              include: ["src/**"]
          unknown_file: ignore
          YAML

          git add should-build.yaml && git commit -m "init"

      - name: Build from source in consumer CWD
        working-directory: consumer
        env:
          GITHUB_ACTION_PATH: ${{ github.workspace }}/_action
        run: |
          set -euo pipefail
          # Mirrors the "Build from source (fallback)" step in action.yml.
          # Before the fix, this failed: "directory ... outside main module."
          go build -C "$GITHUB_ACTION_PATH" -o "$RUNNER_TEMP/should-build" ./cmd/should-build

      - name: Verify env-var ref resolution
        run: |
          set -euo pipefail
          # Simulate runtime env vars as GitHub Actions sets them for a
          # remote action reference (uses: prassoai/should-build@v0).
          tag="$GITHUB_ACTION_REF"   # unset here → empty, same as old bug
          repo="$GITHUB_ACTION_REPOSITORY"

          # With the old ${{ github.action_ref }} approach, these were always
          # empty in composite run: blocks. Verify the env vars exist and are
          # populated by the runner (they won't be in this simulation, which
          # is the point — the action now reads the env vars, not expressions).
          #
          # Structural check: grep the action.yml to confirm it uses the env
          # vars, not the expression syntax.
          grep -q 'tag="\$GITHUB_ACTION_REF"' "${{ github.workspace }}/_action/action.yml"
          grep -q 'repo="\$GITHUB_ACTION_REPOSITORY"' "${{ github.workspace }}/_action/action.yml"
          echo "PASS: action.yml uses runtime env vars, not expression syntax"

      - name: End-to-end consumer run
        working-directory: consumer
        run: |
          set -euo pipefail
          base=$(git rev-parse HEAD)
          mkdir -p src && echo "change" > src/file.txt
          git add src/file.txt && git commit -m "touch src"
          head=$(git rev-parse HEAD)

          raw=$("$RUNNER_TEMP/should-build" --json --config should-build.yaml --repo . "$base" "$head")
          echo "$raw" | jq -e '.[] | select(.target == "svc") | .build == true'
          echo "PASS: consumer scenario works end-to-end"

  # Verify the fromJSON(targets) matrix pattern works end-to-end.
  # test-action triggers alpha only, so the matrix has exactly one entry.
  test-matrix-consumer:
    needs: test-action
    if: needs.test-action.outputs.any == 'true'
    strategy:
      matrix:
        target: ${{ fromJSON(needs.test-action.outputs.targets) }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify matrix entry
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          [[ "$TARGET" == "alpha" ]]
