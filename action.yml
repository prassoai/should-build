name: should-build
description: |
  Determine which build targets need rebuilding after a code change.
  Runs on Linux and macOS. Windows is not supported.
author: Prasso AI

branding:
  icon: filter
  color: blue

inputs:
  base:
    description: Base commit SHA (e.g. from nrwl/nx-set-shas).
    required: true
  head:
    description: Head commit SHA.
    required: true
  config:
    description: Path to config file, relative to repo root.
    required: false
    default: should-build.yaml
  only:
    description: Comma-separated target names to evaluate (no whitespace). Empty evaluates all.
    required: false
    default: ""
  repo:
    description: Repository root path.
    required: false
    default: "."
  verbose:
    description: Include per-file match rules in JSON and table output.
    required: false
    default: "false"

outputs:
  targets:
    description: JSON array of target names that need rebuilding, e.g. '["api","web"]'.
    value: ${{ steps.eval.outputs.targets }}
  any:
    description: '"true" if any target needs rebuilding, "false" otherwise.'
    value: ${{ steps.eval.outputs.any }}
  json:
    description: Full JSON output from should-build.
    value: ${{ steps.eval.outputs.json }}

runs:
  using: composite
  steps:
    - name: Download prebuilt binary
      id: download
      shell: bash
      run: |
        set -euo pipefail

        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        arch="$(uname -m)"
        case "$arch" in
          x86_64)        arch=amd64 ;;
          aarch64|arm64) arch=arm64 ;;
        esac

        binary="should-build-${os}-${arch}"
        tag="${{ github.action_ref }}"
        repo="${{ github.action_repository }}"

        # Empty ref (local action via uses: ./) — no release to download.
        # Non-version ref (branch name, SHA) — build from source.
        # SHA-pinned consumers must never silently receive a different release's binary.
        if [[ -z "$tag" ]] || [[ ! "$tag" =~ ^v[0-9] ]] || [[ "$tag" =~ ^[0-9a-f]{40}$ ]]; then
          echo "source=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        base_url="https://github.com/${repo}/releases"

        download_and_verify() {
          local bin_url="$1" checksum_url="$2"
          local staging="$RUNNER_TEMP/should-build.staging"

          curl -fsSL --retry 2 -o "$staging" "$bin_url" || return 1
          curl -fsSL --retry 2 -o "$RUNNER_TEMP/checksums.txt" "$checksum_url" || return 1

          # Extract the expected hash with exact field match (second field == binary name).
          # Exits non-zero if the binary isn't in the checksums file.
          local expected actual
          expected="$(awk -v b="${binary}" '$2 == b {print $1; found=1} END{if(!found) exit 1}' \
            "$RUNNER_TEMP/checksums.txt")" || { rm -f "$staging"; return 1; }
          if command -v sha256sum &>/dev/null; then
            actual="$(sha256sum "$staging" | awk '{print $1}')"
          else
            actual="$(shasum -a 256 "$staging" | awk '{print $1}')"
          fi

          if [[ -n "$expected" && "$expected" == "$actual" ]]; then
            mv "$staging" "$RUNNER_TEMP/should-build"
            chmod +x "$RUNNER_TEMP/should-build"
            return 0
          fi
          rm -f "$staging"
          return 1
        }

        # Resolve the release tag to download.
        # Exact semver (v1.2.3) downloads directly. Major-version alias (v1)
        # resolves to the newest stable v1.* release via the GitHub API so that
        # @v1 consumers never silently jump to v2 when a new major ships.
        release_tag=""
        if [[ "$tag" =~ ^v[0-9]+$ ]]; then
          # Find the highest semver vN.* release. Uses sort -V (version sort)
          # so that a backport like v1.0.1 published after v1.2.0 doesn't
          # regress consumers — highest version wins, not newest-by-date.
          release_tag="$(curl -fsSL \
            "https://api.github.com/repos/${repo}/releases?per_page=100" \
            | jq -r --arg pfx "${tag}." \
              '.[] | select(.prerelease == false) | select(.tag_name | startswith($pfx)) | .tag_name' \
            | sort -V | tail -1)" || true
          if [[ -z "$release_tag" ]]; then
            echo "::notice::No ${tag}.* release found; building from source."
            echo "source=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        else
          release_tag="$tag"
        fi

        bin_url="${base_url}/download/${release_tag}/${binary}"
        cs_url="${base_url}/download/${release_tag}/checksums.txt"

        if download_and_verify "$bin_url" "$cs_url"; then
          echo "Downloaded prebuilt ${binary} (${release_tag})"
          echo "source=false" >> "$GITHUB_OUTPUT"
        else
          rm -f "$RUNNER_TEMP/should-build.staging"
          echo "::notice::Prebuilt binary not available for ${os}/${arch}; building from source."
          echo "source=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Go (fallback)
      if: steps.download.outputs.source == 'true'
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod

    - name: Build from source (fallback)
      if: steps.download.outputs.source == 'true'
      shell: bash
      run: |
        set -euo pipefail
        go build -o "$RUNNER_TEMP/should-build" "${{ github.action_path }}/cmd/should-build"

    - name: Evaluate targets
      id: eval
      shell: bash
      env:
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_ONLY: ${{ inputs.only }}
        INPUT_BASE: ${{ inputs.base }}
        INPUT_HEAD: ${{ inputs.head }}
      run: |
        set -euo pipefail

        # --explain: always emit human-readable explanation to stderr (visible in the Actions log).
        # --verbose: controlled by the caller's verbose input (includes Rule fields in JSON).
        args=(--json --explain)
        args+=(--config "$INPUT_CONFIG")
        args+=(--repo "$INPUT_REPO")

        if [[ "$INPUT_VERBOSE" == "true" ]]; then
          args+=(--verbose)
        fi

        if [[ -n "$INPUT_ONLY" ]]; then
          IFS=',' read -ra FILTER <<< "$INPUT_ONLY"
          for t in "${FILTER[@]}"; do
            args+=(--target "$t")
          done
        fi

        args+=("$INPUT_BASE" "$INPUT_HEAD")

        raw_json=$("$RUNNER_TEMP/should-build" "${args[@]}")

        # Validate the CLI produced a JSON array.
        if ! echo "$raw_json" | jq -e 'type == "array"' > /dev/null 2>&1; then
          echo "::error::should-build did not produce a JSON array"
          exit 1
        fi

        targets=$(echo "$raw_json" | jq -c '[.[] | select(.build == true) | .target]')
        any=$(echo "$raw_json" | jq -r 'any(.[]; .build == true)')

        {
          echo "json<<SHOULD_BUILD_EOF"
          echo "$raw_json"
          echo "SHOULD_BUILD_EOF"
          echo "targets=$targets"
          echo "any=$any"
        } >> "$GITHUB_OUTPUT"

        # Step summary: markdown table on the workflow run page.
        # Shows first triggering file + count of remaining files for compactness;
        # the full per-file detail is in the log via --explain.
        summary=$(
          echo "### should-build"
          echo ""
          echo "| Target | Build | Trigger |"
          echo "|--------|-------|---------|"
          echo "$raw_json" | jq -r '.[] |
            if .build then
              "| `" + .target + "` | ✅ yes | `" +
              (.files[0].path) + "` (" + .files[0].reason +
              (if .files[0].rule then ": `" + .files[0].rule + "`" else "" end) +
              ")" +
              (if (.files | length) > 1 then " + " + ((.files | length) - 1 | tostring) + " more" else "" end) +
              " |"
            else
              "| `" + .target + "` | ⬜ no | — |"
            end'
        )
        echo "$summary" >> "$GITHUB_STEP_SUMMARY"
        # Also write to a fixed path so later steps can verify the content.
        # $GITHUB_STEP_SUMMARY is per-step and not readable across steps.
        echo "$summary" > "$RUNNER_TEMP/should-build-summary.md"
